<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients for depth -->
  <defs>
    <linearGradient id="bulbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stairsGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E90FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4169E1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4169E1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Light Bulb Outer Circle -->
  <circle cx="100" cy="70" r="45" fill="none" stroke="url(#bulbGradient)" stroke-width="5"/>

  <!-- Light Bulb Rays -->
  <g stroke="url(#bulbGradient)" stroke-width="4" stroke-linecap="round">
    <line x1="100" y1="15" x2="100" y2="5"/>
    <line x1="100" y1="125" x2="100" y2="135"/>
    <line x1="45" y1="70" x2="35" y2="70"/>
    <line x1="155" y1="70" x2="165" y2="70"/>
    <line x1="55" y1="25" x2="48" y2="18"/>
    <line x1="152" y1="122" x2="159" y2="129"/>
    <line x1="145" y1="25" x2="152" y2="18"/>
    <line x1="48" y1="122" x2="41" y2="129"/>
  </g>

  <!-- Stairs inside bulb -->
  <g fill="url(#stairsGradient)">
    <!-- Step 1 (bottom) -->
    <rect x="75" y="95" width="18" height="12" rx="2"/>
    <!-- Step 2 -->
    <rect x="70" y="83" width="18" height="12" rx="2"/>
    <!-- Step 3 -->
    <rect x="65" y="71" width="18" height="12" rx="2"/>
    <!-- Step 4 (top) -->
    <rect x="60" y="59" width="18" height="12" rx="2"/>
  </g>

  <!-- Flag on top of stairs -->
  <g>
    <!-- Flag pole -->
    <line x1="75" y1="55" x2="75" y2="40" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
    <!-- Flag -->
    <path d="M 75 42 L 95 48 L 95 54 L 75 48 Z" fill="#6495ED"/>
  </g>

  <!-- Sparkle/Star near flag -->
  <g fill="#FFD700">
    <polygon points="92,35 95,42 103,42 97,47 100,54 92,50 84,54 87,47 81,42 89,42"/>
  </g>

  <!-- Open Book -->
  <g>
    <!-- Left page -->
    <path d="M 60 140 Q 50 140 50 155 L 50 185 Q 50 190 55 190 L 85 190 L 85 155 Q 85 140 75 140 Z" 
          fill="url(#bookGradient)" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Right page -->
    <path d="M 140 140 Q 150 140 150 155 L 150 185 Q 150 190 145 190 L 115 190 L 115 155 Q 115 140 125 140 Z" 
          fill="#87CEEB" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Book spine -->
    <line x1="85" y1="155" x2="115" y2="155" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="85" y1="190" x2="115" y2="190" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Reading lines on left page -->
    <line x1="60" y1="165" x2="75" y2="165" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
    <line x1="60" y1="172" x2="75" y2="172" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
    <line x1="60" y1="179" x2="75" y2="179" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
    <!-- Reading lines on right page -->
    <line x1="125" y1="165" x2="140" y2="165" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
    <line x1="125" y1="172" x2="140" y2="172" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
    <line x1="125" y1="179" x2="140" y2="179" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
