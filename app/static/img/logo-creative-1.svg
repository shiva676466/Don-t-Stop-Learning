<?xml version="1.0" encoding="UTF-8"?>
<!-- Creative variant 1: "Tree of Learning" - book base with upward leaf-arrow canopy -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" aria-hidden="true">
  <defs>
    <linearGradient id="c1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="96" height="96" rx="18" fill="#0f1724" opacity="0.02"/>
  <!-- book base -->
  <path d="M18 60c8-6 20-9 30-9s22 3 30 9v10c-8-5-20-8-30-8s-22 3-30 8V60z" fill="#fff"/>
  <!-- trunk -->
  <rect x="44" y="34" width="8" height="18" rx="3" fill="url(#c1)"/>
  <!-- canopy (leaf arrow) -->
  <path d="M48 16c8 6 18 14 18 22 0 8-10 16-18 22-8-6-18-14-18-22 0-8 10-16 18-22z" fill="url(#c1)"/>
  <path d="M44 26l8-6 8 6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- accent circle -->
  <circle cx="48" cy="48" r="2.5" fill="#fff"/>
</svg>
