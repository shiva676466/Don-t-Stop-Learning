{% extends 'base.html' %} {% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0">{{ roadmap.skill }} Flowchart</h2>
  <a
    href="{{ url_for('learning.view_roadmap', roadmap_id=roadmap.id) }}"
    class="btn btn-outline-secondary btn-sm"
    >Back</a
  >
</div>

<div class="card shadow-sm">
  <div class="card-body">
    <div class="d-flex mb-2 gap-2">
      <button id="zoom-in" class="btn btn-sm btn-outline-primary">
        Zoom In
      </button>
      <button id="zoom-out" class="btn btn-sm btn-outline-primary">
        Zoom Out
      </button>
      <button id="zoom-reset" class="btn btn-sm btn-outline-secondary">
        Reset
      </button>
    </div>

    <div id="mermaid-wrap" class="mermaid">{{ mermaid | safe }}</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/svg-pan-zoom/3.6.1/svg-pan-zoom.min.js"></script>
<script>
  mermaid.initialize({ startOnLoad: true });

  // After mermaid renders, initialize svg-pan-zoom on the produced <svg>
  document.addEventListener("DOMContentLoaded", function () {
    // Poll until mermaid replaces the .mermaid block with an svg
    const wrap = document.getElementById("mermaid-wrap");
    const attemptInit = () => {
      const svg = wrap.querySelector("svg");
      if (!svg) {
        setTimeout(attemptInit, 200);
        return;
      }

      // initialize pan/zoom
      const panZoomInstance = svgPanZoom(svg, {
        zoomEnabled: true,
        controlIconsEnabled: false,
        fit: true,
        center: true,
        minZoom: 0.2,
        maxZoom: 5,
      });

      document
        .getElementById("zoom-in")
        .addEventListener("click", () => panZoomInstance.zoomIn());
      document
        .getElementById("zoom-out")
        .addEventListener("click", () => panZoomInstance.zoomOut());
      document
        .getElementById("zoom-reset")
        .addEventListener("click", () => panZoomInstance.resetZoom());
    };

    attemptInit();
  });
</script>
{% endblock %}
