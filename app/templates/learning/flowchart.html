{% extends 'base.html' %} {% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">{{ roadmap.skill }} Flowchart</h2>
    <a href="{{ url_for('learning.view_roadmap', roadmap_id=roadmap.id) }}"
        class="btn btn-outline-secondary btn-sm">Back</a>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <div class="d-flex mb-2 gap-2">
            <button type="button" id="zoom-in" class="btn btn-sm btn-outline-primary">
                Zoom In
            </button>
            <button type="button" id="zoom-out" class="btn btn-sm btn-outline-primary">
                Zoom Out
            </button>
            <button type="button" id="zoom-reset" class="btn btn-sm btn-outline-secondary">
                Reset
            </button>
        </div>

        <div id="mermaid-wrap" class="mermaid">{{ mermaid | safe }}</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/svg-pan-zoom/3.6.1/svg-pan-zoom.min.js"></script>
<script>
    mermaid.initialize({ startOnLoad: true });

    // After mermaid renders, initialize svg-pan-zoom on the produced <svg>
    document.addEventListener("DOMContentLoaded", function () {
        // Poll until mermaid replaces the .mermaid block with an svg
        const wrap = document.getElementById("mermaid-wrap");
        const attemptInit = () => {
            const svg = wrap.querySelector("svg");
            if (!svg) {
                setTimeout(attemptInit, 200);
                return;
            }

            // initialize pan/zoom and attach to window so controls can reach it
            try {
                window.panZoomInstance = svgPanZoom(svg, {
                    zoomEnabled: true,
                    controlIconsEnabled: false,
                    fit: true,
                    center: true,
                    minZoom: 0.2,
                    maxZoom: 5,
                });
            } catch (err) {
                // If initialization fails, log for debugging and stop
                console.error('svgPanZoom init failed', err);
                return;
            }

            const getInstance = () => window.panZoomInstance;

            document.getElementById("zoom-in").addEventListener("click", () => {
                const inst = getInstance();
                if (!inst) return console.warn('panZoom instance not ready');
                try {
                    inst.zoomIn();
                } catch (e) {
                    console.error('zoomIn failed', e);
                }
            });

            document.getElementById("zoom-out").addEventListener("click", () => {
                const inst = getInstance();
                if (!inst) return console.warn('panZoom instance not ready');
                try {
                    inst.zoomOut();
                } catch (e) {
                    console.error('zoomOut failed', e);
                }
            });

            document.getElementById("zoom-reset").addEventListener("click", () => {
                const inst = getInstance();
                if (!inst) return console.warn('panZoom instance not ready');
                try {
                    // some versions expose resetZoom(), others have reset()
                    if (typeof inst.resetZoom === 'function') {
                        inst.resetZoom();
                    } else if (typeof inst.reset === 'function') {
                        inst.reset();
                    } else {
                        // fallback: fit and center
                        if (typeof inst.fit === 'function') inst.fit();
                        if (typeof inst.center === 'function') inst.center();
                    }
                } catch (e) {
                    console.error('reset failed', e);
                }
            });
        };

        attemptInit();
    });
</script>
{% endblock %}
